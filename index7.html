<html>
    <body>
        <h2>JavaScript for Loops</h2>
        <p id="demo"></p>
        <script>
            var fruits = ["Apple", "Mango", "Grapes", "WaterMelon", "Jack Fruit", "Banana", "Strawberry", "Tomato"]
            var text = "";
            var i;
            for(i = 0; i < fruits.length; i++) {
            text +=fruits[i] + "<br>";
             }  
             document.getElementById("demo").innerHTML = text;
        </script>
    </body>
</html>
