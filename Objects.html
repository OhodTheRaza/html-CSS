<html>
<body>
    <H2>JavaScript Objects And Its Properties</H2>
    <p>There are different ways to acces an object's property</p>
    <p>You can use .property or ["property"]</p>
    <p id="demo"></p>
    <script>
        var person = {
        firstName: "Joe",
        age: 20,
        };
        document.getElementById("demo").innerHTML = "My name is " + person.firstName + " i am " + person.age + " years old"
    </script>
</body>
</html>
