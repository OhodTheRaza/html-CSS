<html>
    <body>
        <h2>JavaScript Array Methods<h2>

        </h2>join() and pop()</h2>
        <p id="myjoin"></p>
        <p id="myfirstpop"></p>
        <p id="mysecond pop"></p>
        <script>
            var fruits = [
                "Banana",
                "Orange",
                "Apple",
                "Mango",
                "Grapes",
                "Dragon Fruit",
            ];
            document.getElementById("myjoin").innerHTML = fruits.join(" * ");
            document.getElementById("myfirstpop").innerHTML = fruits.pop();
            document.getElementById("demo").innerHTML = fruits; 
        </script>
    </body>
</html>
